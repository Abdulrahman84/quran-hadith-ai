services:
  - type: web
    name: sanad-ai
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_CONVEX_URL
        value: https://tacit-dolphin-856.convex.cloud
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MANAGEMENT_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-3.1-flash-lite
      - key: OPENROUTER_APP_NAME
        value: Sanad AI
      - key: NTFY_TOPIC
        value: sanad
      - key: NTFY_ACCESS_TOKEN
        sync: false
      - key: NTFY_BASE_URL
        value: https://ntfy.sh
      - key: OPENROUTER_LOW_CREDIT_USD
        value: "1"
      - key: OPENROUTER_CREDIT_CHECK_INTERVAL_MS
        value: "900000"
      - key: CREDIT_ALERT_TIMEOUT_MS
        value: "4000"
      - key: ANSWER_MODEL
        value: google/gemini-3.1-flash-lite
      - key: ANSWER_FALLBACK_MODELS
        value: mistralai/mistral-small-2603
      - key: MCP_TOOL_ROUTER_ENABLED
        value: "true"
      - key: MCP_TOOL_ROUTER_MODEL
        value: google/gemini-3.1-flash-lite
      - key: MCP_TOOL_ROUTER_FALLBACK_MODELS
        value: mistralai/mistral-small-2603
      - key: MCP_TOOL_ROUTER_TIMEOUT_MS
        value: "12000"
      - key: HADITH_QUERY_PLANNER_ENABLED
        value: "true"
      - key: HADITH_QUERY_PLANNER_MODEL
        value: google/gemini-3.1-flash-lite
      - key: HADITH_QUERY_PLANNER_FALLBACK_MODELS
        value: mistralai/mistral-small-2603
      - key: HADITH_QUERY_PLANNER_TIMEOUT_MS
        value: "12000"
      - key: LLM_TIMEOUT_MS
        value: "25000"
