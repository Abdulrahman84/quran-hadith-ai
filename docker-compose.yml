services:
  sanad-ai:
    build:
      context: .
      args:
        HADITH_MCP_REPO: ${HADITH_MCP_REPO:-https://github.com/Abdulrahman84/hadith-mcp.git}
        HADITH_MCP_REF: ${HADITH_MCP_REF:-main}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY before starting sanad-ai}
      OPENROUTER_MANAGEMENT_KEY: ${OPENROUTER_MANAGEMENT_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-4-26b-a4b-it:free}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Sanad AI}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-25000}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
      NTFY_ACCESS_TOKEN: ${NTFY_ACCESS_TOKEN:-}
      OPENROUTER_LOW_CREDIT_USD: ${OPENROUTER_LOW_CREDIT_USD:-1}
      OPENROUTER_CREDIT_CHECK_INTERVAL_MS: ${OPENROUTER_CREDIT_CHECK_INTERVAL_MS:-900000}
      CREDIT_ALERT_TIMEOUT_MS: ${CREDIT_ALERT_TIMEOUT_MS:-4000}
      ANSWER_MODEL: ${ANSWER_MODEL:-google/gemma-4-26b-a4b-it:free}
      ANSWER_FALLBACK_MODELS: ${ANSWER_FALLBACK_MODELS:-liquid/lfm-2.5-1.2b-instruct:free}
      MCP_TOOL_ROUTER_ENABLED: ${MCP_TOOL_ROUTER_ENABLED:-true}
      MCP_TOOL_ROUTER_MODEL: ${MCP_TOOL_ROUTER_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
      MCP_TOOL_ROUTER_FALLBACK_MODELS: ${MCP_TOOL_ROUTER_FALLBACK_MODELS:-liquid/lfm-2.5-1.2b-thinking:free}
      MCP_TOOL_ROUTER_TIMEOUT_MS: ${MCP_TOOL_ROUTER_TIMEOUT_MS:-12000}
      HADITH_QUERY_PLANNER_ENABLED: ${HADITH_QUERY_PLANNER_ENABLED:-true}
      HADITH_QUERY_PLANNER_MODEL: ${HADITH_QUERY_PLANNER_MODEL:-google/gemma-4-26b-a4b-it:free}
      HADITH_QUERY_PLANNER_FALLBACK_MODELS: ${HADITH_QUERY_PLANNER_FALLBACK_MODELS:-}
      HADITH_QUERY_PLANNER_TIMEOUT_MS: ${HADITH_QUERY_PLANNER_TIMEOUT_MS:-12000}
