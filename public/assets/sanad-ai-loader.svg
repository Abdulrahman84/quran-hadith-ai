<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 82" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Sanad AI loading</title>
  <desc id="desc">A navy book receives a gold trace while the assistant antenna pulses.</desc>
  <style>
    .trace {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: trace-book 2.2s ease-in-out infinite;
    }
    .signal {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse-signal 2.2s ease-in-out infinite;
    }
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    .eye-right { animation-delay: .08s; }
    @keyframes trace-book {
      0%, 12% { stroke-dashoffset: 1; opacity: .3; }
      64%, 100% { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes pulse-signal {
      0%, 55%, 100% { opacity: .4; transform: scale(.72); }
      72% { opacity: 1; transform: scale(1.25); }
    }
    @keyframes blink {
      0%, 91%, 97%, 100% { transform: scaleY(1); }
      94% { transform: scaleY(.12); }
    }
    @media (prefers-reduced-motion: reduce) {
      .trace, .signal, .eye { animation: none; }
      .trace { stroke-dashoffset: 0; opacity: 1; }
    }
  </style>

  <path d="M51 18c14 0 26 3 37 13 11-10 23-13 37-13v49c-15 0-27 4-37 12-10-8-22-12-37-12Z" stroke="#163A5F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M59 27v33c11 1 21 4 29 10m29-43v33c-11 1-21 4-29 10V34" stroke="#163A5F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>
  <path class="trace" pathLength="1" d="M51 18c14 0 26 3 37 13 11-10 23-13 37-13v49c-15 0-27 4-37 12-10-8-22-12-37-12Z" stroke="#B38B45" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 30v-7" stroke="#B38B45" stroke-width="3" stroke-linecap="round"/>
  <circle class="signal" cx="88" cy="19" r="4" fill="#B38B45"/>
  <rect x="69" y="30" width="38" height="28" rx="13" fill="#B38B45"/>
  <rect x="75" y="36" width="26" height="15" rx="7" fill="#163A5F"/>
  <circle class="eye" cx="82" cy="43.5" r="2" fill="#F3F1E8"/>
  <circle class="eye eye-right" cx="94" cy="43.5" r="2" fill="#F3F1E8"/>
</svg>
